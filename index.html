        :root {

            --cafe-accent: #c68642;
            --cafe-light: #fdfaf5;
            --cafe-cream: #f5ebe0;
        }

        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background-color: var(--cafe-light);
            color: var(--cafe-dark);
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        .category-active {
            background-color: var(--cafe-accent);
            color: white;
            border-color: var(--cafe-accent);
            transform: scale(1.05);
        }

        .menu-card {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 2px 8px rgba(45, 30, 22, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease;

            background: var(--cafe-dark);
            box-shadow: 0 10px 30px rgba(45, 30, 22, 0.3);
            border: 2px solid var(--cafe-accent);
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }
        .animate-slide-up { animation: slideUp 0.25s ease-out; }
    </style>
</head>

                    const existing = prev.find(i => i.id === item.id);

                    return [...prev, { ...item, qty: 1 }];
                });
            };
