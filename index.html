<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WU COFFEE - Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        
        :root {
            --cafe-dark: #2d1e16;
            --cafe-accent: #c68642;
            --cafe-light: #fdfaf5;
            --cafe-cream: #f5ebe0;
        }

        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background-color: var(--cafe-light);
            color: var(--cafe-dark);
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .category-active {
            background-color: var(--cafe-accent);
            color: white;
            border-color: var(--cafe-accent);
        }

        .menu-card {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 2px 8px rgba(45, 30, 22, 0.05);
            transition: all 0.2s ease;
        }

        .order-btn-fixed {
            background: var(--cafe-dark);
            box-shadow: 0 8px 25px rgba(45, 30, 22, 0.2);
            border: 1px solid var(--cafe-accent);
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- သူငယ်ချင်း... မင်းရဲ့ Bot Token နဲ့ Chat ID ကို ဒီမှာ လဲပေးနော် ---
        const TG_BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"; 
        const TG_CHAT_ID = "YOUR_CHAT_ID_HERE";     
        // ------------------------------------------------------------------

        const Icons = {
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Minus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Cart: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Coffee: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>,
            Check: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        function App() {
            const tableFromUrl = new URLSearchParams(window.location.search).get('table') || '';
            const [activeTab, setActiveTab] = useState('COFFEE');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [customerInfo, setCustomerInfo] = useState({ name: '', table: tableFromUrl });
            const [status, setStatus] = useState('idle');

            const allMenus = [
                // COFFEE
                { id: 1, cat: 'COFFEE', n: 'Espresso', s: '濃縮咖啡', p: 80, ps: '60/80 B', img: "" },
                { id: 2, cat: 'COFFEE', n: 'Macchiato', s: '瑪奇朵', p: 80, ps: '80 B', img: "" },
                { id: 3, cat: 'COFFEE', n: 'Piccolo', s: '短笛', p: 80, ps: '80 B', img: "" },
                { id: 4, cat: 'COFFEE', n: 'Cortado', s: '科爾塔多', p: 80, ps: '80 B', img: "" },
                { id: 5, cat: 'COFFEE', n: 'Americano', s: '美式咖啡', p: 100, ps: '80/100 B', img: "" },
                { id: 6, cat: 'COFFEE', n: 'Cappuccino', s: '卡布奇諾', p: 100, ps: '80/100 B', img: "" },
                { id: 7, cat: 'COFFEE', n: 'Latte', s: '拿鐵', p: 100, ps: '80/100 B', img: "" },
                { id: 8, cat: 'COFFEE', n: 'Mocha', s: '摩卡', p: 120, ps: '100/120 B', img: "" },
                // SIGNATURE
                { id: 20, cat: 'SIGNATURE', n: 'Wu Coffee', s: '悟咖啡', p: 120, ps: '120 B', img: "" },
                { id: 21, cat: 'SIGNATURE', n: 'Dirty Latte', s: '骯髒拿鐵', p: 120, ps: '120 B', img: "" },
                { id: 22, cat: 'SIGNATURE', n: 'Nutty Latte', s: '堅果拿鐵', p: 120, ps: '120 B', img: "" },
                { id: 23, cat: 'SIGNATURE', n: 'Caramel Latte', s: '焦糖拿鐵', p: 120, ps: '120 B', img: "" },
                { id: 24, cat: 'SIGNATURE', n: 'Einspanner', s: '冰叔手', p: 120, ps: '120 B', img: "" },
                { id: 25, cat: 'SIGNATURE', n: 'Santorini Lemonade', s: '聖托里尼', p: 120, ps: '120 B', img: "" },
                { id: 26, cat: 'SIGNATURE', n: 'Red Eye', s: '紅眼', p: 120, ps: '120 B', img: "" },
                { id: 27, cat: 'SIGNATURE', n: 'Strawberry Coffee', s: '草莓咖啡', p: 120, ps: '120 B', img: "" },
                // NON-COFFEE
                { id: 30, cat: 'NON-COFFEE', n: 'Chocolate', s: '巧克力', p: 120, ps: '100/120 B', img: "" },
                { id: 31, cat: 'NON-COFFEE', n: 'Matcha Latte', s: '抹茶拿鐵', p: 120, ps: '100/120 B', img: "" },
                { id: 32, cat: 'NON-COFFEE', n: 'Matcha Orange', s: '抹茶橙', p: 120, ps: '120 B', img: "" },
                // TEA
                { id: 35, cat: 'TEA', n: 'English Breakfast', s: '英式早餐', p: 60, ps: '60 B', img: "" },
                { id: 36, cat: 'TEA', n: 'Earl Grey', s: '伯爵茶', p: 60, ps: '60 B', img: "" },
                { id: 37, cat: 'TEA', n: 'Green Tea Jasmine', s: '茉莉綠茶', p: 60, ps: '60 B', img: "" },
                // SMOOTHIES
                { id: 40, cat: 'SMOOTHIES', n: 'Strawberry Smoothie', s: '草莓昔', p: 140, ps: '140 B', img: "" },
                { id: 41, cat: 'SMOOTHIES', n: 'Mango Smoothie', s: '芒果昔', p: 140, ps: '140 B', img: "" },
                { id: 42, cat: 'SMOOTHIES', n: 'Blueberry Smoothie', s: '藍莓昔', p: 140, ps: '140 B', img: "" },
                // FRAPPE
                { id: 50, cat: 'FRAPPE', n: 'Oreo Frappe', s: '奥利奥', p: 140, ps: '140 B', img: "" },
                { id: 51, cat: 'FRAPPE', n: 'Green Tea Frappe', s: '綠茶冰沙', p: 140, ps: '140 B', img: "" },
                { id: 52, cat: 'FRAPPE', n: 'Mocha Frappe', s: '摩卡冰沙', p: 140, ps: '140 B', img: "" },
                // SODA
                { id: 60, cat: 'SODA', n: 'Lime Soda', s: '青檸蘇打', p: 120, ps: '120 B', img: "" },
                { id: 61, cat: 'SODA', n: 'Peach Soda', s: '桃子蘇打', p: 120, ps: '120 B', img: "" },
                // SPECIAL
                { id: 70, cat: 'SPECIAL', n: 'Hand Drip', s: '手冲', p: 180, ps: '180 B', img: "" },
                { id: 71, cat: 'SPECIAL', n: 'Cold Brew', s: '冷萃', p: 120, ps: '120 B', img: "" },
                { id: 72, cat: 'SPECIAL', n: 'Appresso', s: '濃縮咖啡', p: 120, ps: '120 B', img: "" }
            ];

            const addToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { ...item, qty: 1 }];
                });
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.map(i => i.id === id ? { ...i, qty: i.qty - 1 } : i).filter(i => i.qty > 0));
            };

            const sendOrder = async () => {
                if (cart.length === 0 || !customerInfo.name || !customerInfo.table) return;
                setStatus('sending');
                const total = cart.reduce((sum, i) => sum + (i.p * i.qty), 0);
                let message = `☕ *WU COFFEE - အော်ဒါအသစ်*\n━━━━━━━━━━━━━━━\n👤 နာမည်: ${customerInfo.name}\n📍 စားပွဲနံပါတ်: ${customerInfo.table}\n━━━━━━━━━━━━━━━\n`;
                cart.forEach(item => { message += `• ${item.n} (${item.qty} ခွက်) - ${item.p * item.qty} B\n`; });
                message += `━━━━━━━━━━━━━━━\n💰 *စုစုပေါင်း: ${total} B*`;

                try {
                    const res = await fetch(`https://api.telegram.org/bot${8722217772:AAELMPB5KSVgaip-aK9LdXMn3rn7U3DOxgI}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: 7786116951, text: message, parse_mode: 'Markdown' })
                    });
                    if (res.ok) {
                        setStatus('success');
                        setCart([]);
                        setTimeout(() => { setStatus('idle'); setIsCartOpen(false); }, 3000);
                    } else { setStatus('error'); }
                } catch { setStatus('error'); }
            };

            return (
                <div className="min-h-screen pb-36">
                    {/* Header */}
                    <header className="bg-[#2d1e16] text-white pt-10 pb-12 px-6 text-center rounded-b-[2.5rem] shadow-lg relative border-b-4 border-[#c68642]">
                        <div className="w-16 h-16 bg-[#c68642] rounded-full flex items-center justify-center mx-auto mb-3 text-3xl font-bold border-2 border-white shadow-inner">悟</div>
                        <h1 className="text-2xl font-black tracking-widest uppercase">WU COFFEE</h1>
                        <p className="text-[9px] text-white/50 font-bold uppercase tracking-widest">Premium Menu System</p>
                    </header>

                    <main className="max-w-xl mx-auto px-4 -mt-6">
                        {/* Category Selector */}
                        <div className="flex overflow-x-auto gap-2 py-4 no-scrollbar sticky top-0 bg-[#fdfaf5]/90 backdrop-blur-md z-40 mb-4 px-1 border-b border-stone-100">
                            {['COFFEE', 'SIGNATURE', 'NON-COFFEE', 'TEA', 'SMOOTHIES', 'FRAPPE', 'SODA', 'SPECIAL'].map(cat => (
                                <button key={cat} onClick={() => setActiveTab(cat)} className={`px-4 py-2 rounded-full text-[10px] font-black tracking-widest border transition-all whitespace-nowrap ${activeTab === cat ? 'category-active' : 'bg-white text-stone-400 border-stone-200'}`}>{cat}</button>
                            ))}
                        </div>

                        {/* Menu List */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {allMenus.filter(i => i.cat === activeTab).map(item => (
                                <div key={item.id} className="menu-card p-3.5 flex gap-4 items-center border border-stone-100 active:scale-95 transition-transform">
                                    <div className="w-12 h-12 bg-[#f5ebe0] rounded-2xl flex items-center justify-center text-[#c68642] shrink-0 border border-white overflow-hidden">
                                        {item.img ? <img src={item.img} className="w-full h-full object-cover" /> : <Icons.Coffee />}
                                    </div>
                                    <div className="flex-grow min-w-0">
                                        <h3 className="font-bold text-sm text-[#2d1e16] truncate">{item.n}</h3>
                                        <p className="text-[10px] text-stone-400 font-bold">{item.s}</p>
                                        <p className="text-[#c68642] font-black text-xs mt-1">{item.ps}</p>
                                    </div>
                                    <button onClick={() => addToCart(item)} className="w-9 h-9 bg-[#2d1e16] text-white rounded-full flex items-center justify-center shadow-md active:bg-[#c68642] transition-colors"><Icons.Plus /></button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Fixed Order Check Button */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50">
                        <button onClick={() => setIsCartOpen(true)} className="order-btn-fixed w-full py-4 rounded-full flex items-center justify-center gap-3 text-white active:scale-95 transition relative">
                            <Icons.Cart />
                            <span className="text-xs font-black uppercase tracking-widest">မှာထားသည်များ ကြည့်မည်</span>
                            {cart.length > 0 && <span className="absolute -top-2 -right-1 bg-red-600 text-white text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white animate-bounce shadow-lg">{cart.reduce((s,i)=>s+i.qty,0)}</span>}
                        </button>
                    </div>

                    {/* Cart/Order Modal */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-end justify-center px-4 pb-8">
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-6 shadow-2xl flex flex-col animate-slide-up max-h-[85vh] overflow-hidden border-t-8 border-[#c68642]">
                                <div className="flex justify-between items-center mb-6 px-2 shrink-0">
                                    <h3 className="text-lg font-black uppercase text-[#2d1e16] tracking-tighter">Your Order</h3>
                                    <button onClick={() => setIsCartOpen(false)} className="text-stone-300 p-2"><Icons.X /></button>
                                </div>

                                {status === 'success' ? (
                                    <div className="text-center py-16"><div className="flex justify-center mb-4"><Icons.Check /></div><h4 className="font-black text-xl text-[#2d1e16]">အော်ဒါတင်ပြီးပါပြီ</h4></div>
                                ) : (
                                    <div className="flex flex-col h-full overflow-hidden">
                                        <div className="flex-grow overflow-y-auto pr-1 no-scrollbar mb-6 space-y-1">
                                            {cart.length === 0 ? <div className="text-center py-12 opacity-20 italic text-sm text-stone-400">မီနူး မရွေးရသေးပါ</div> : cart.map(item => (
                                                <div key={item.id} className="flex justify-between items-center py-3 border-b border-stone-50">
                                                    <div className="min-w-0 pr-4">
                                                        <p className="font-bold text-sm text-[#2d1e16] truncate">{item.n}</p>
                                                        <p className="text-[10px] text-stone-400">{item.p} B x {item.qty}</p>
                                                    </div>
                                                    <div className="flex items-center gap-3 bg-[#f5ebe0] px-2.5 py-1.5 rounded-full border border-white">
                                                        <button onClick={()=>removeFromCart(item.id)} className="text-stone-400"><Icons.Minus /></button>
                                                        <span className="font-black text-sm text-[#2d1e16] w-4 text-center">{item.qty}</span>
                                                        <button onClick={()=>addToCart(item)} className="text-stone-400"><Icons.Plus /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {cart.length > 0 && (
                                            <div className="border-t border-stone-100 pt-4 space-y-4 shrink-0">
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="text-[9px] font-black text-stone-400 uppercase ml-2 mb-1 block">နာမည်</label>
                                                        <input type="text" placeholder="သင့်နာမည်..." className="w-full bg-[#f5ebe0] px-4 py-2.5 rounded-xl text-sm font-bold outline-none border border-transparent focus:border-[#c68642] transition-all" value={customerInfo.name} onChange={e=>setCustomerInfo({...customerInfo, name: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="text-[9px] font-black text-stone-400 uppercase ml-2 mb-1 block">စားပွဲနံပါတ်</label>
                                                        <input type="text" placeholder="ဝိုင်း..." className="w-full bg-[#f5ebe0] px-4 py-2.5 rounded-xl text-sm font-bold outline-none border border-transparent focus:border-[#c68642] transition-all" value={customerInfo.table} onChange={e=>setCustomerInfo({...customerInfo, table: e.target.value})} />
                                                    </div>
                                                </div>

                                                <div className="flex justify-between items-center px-2 py-2">
                                                    <span className="text-[9px] font-black text-stone-300 uppercase tracking-widest">Total Amount</span>
                                                    <span className="text-2xl font-black text-[#2d1e16]">{cart.reduce((s,i)=>s+(i.p*i.qty),0)} B</span>
                                                </div>

                                                <button disabled={!customerInfo.name || !customerInfo.table || status === 'sending'} onClick={sendOrder} className={`w-full py-4 rounded-full font-black text-xs uppercase shadow-lg active:scale-95 transition-all flex justify-center items-center gap-3 ${customerInfo.name && customerInfo.table && status !== 'sending' ? 'bg-[#2d1e16] text-white border-b-2 border-[#c68642]' : 'bg-stone-200 text-stone-400 cursor-not-allowed'}`}>
                                                    {status === 'sending' ? (
                                                        <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                    ) : 'Confirm & Send to Telegram'}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const roo
